name: "BLE Room Map"
version: "0.1.14"
slug: "ble_room_map"
description: "Visualize BLE devices on a simple room map from MQTT scanner RSSI"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: services
boot: auto
init: false
host_network: false
ingress: true
ingress_port: 8099
panel_icon: mdi:map-marker-radius
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Web UI
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  topic_prefix: "ble_scanner"
  scanner_positions_json: '{}'
  tracked_devices_json: '{}'
  tx_power: -59
  n_factor: 2.2
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str?
  mqtt_pass: password?
  topic_prefix: str
  scanner_positions_json: str
  tracked_devices_json: str
  tx_power: int
  n_factor: float
