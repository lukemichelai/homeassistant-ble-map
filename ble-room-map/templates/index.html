<!doctype html>
<html><head><meta charset="utf-8" /><title>BLE Room Map</title>
<style>
body{font-family:sans-serif;margin:0;display:grid;grid-template-columns:1fr 340px;height:100vh}
#main{display:flex;flex-direction:column;min-width:0}
#top{padding:10px 14px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between}
#map{position:relative;flex:1;background:#f7f7f7 center/contain no-repeat;overflow:hidden}
#side{border-left:1px solid #ddd;padding:10px;overflow:auto}
.dot{position:absolute;width:14px;height:14px;border-radius:50%;transform:translate(-50%,-50%);transition:left .5s linear,top .5s linear}
.scanner{background:#2563eb}.device{background:#ef4444}.fixed{background:#10b981}
.label{position:absolute;transform:translate(10px,-8px);font-size:12px;background:rgba(255,255,255,.9);padding:2px 6px;border-radius:6px;transition:left .5s linear,top .5s linear}
a{text-decoration:none;color:#2563eb;margin-left:10px}
.card{border:1px solid #e5e7eb;border-radius:8px;padding:8px;margin-bottom:8px;font-size:12px}
.k{color:#555}.v{font-weight:600}
</style></head><body>
<div id="main">
  <div id="top"><strong>BLE Room Map</strong><div><a href="devices">Devices</a><a href="settings">Settings</a></div></div>
  <div id="map"></div>
</div>
<div id="side">
  <h3 style="margin-top:4px">Live device info</h3>
  <div id="cards"></div>
</div>
<script>
const map=document.getElementById('map'); const cards=document.getElementById('cards');
let layout={map_width:10,map_height:5,scanner_positions:{}}; let mapSet=false;
function px(x,y){const w=map.clientWidth,h=map.clientHeight;return{l:(x/layout.map_width)*w,t:h-(y/layout.map_height)*h}}
function upsert(id,cls,x,y,label){const p=px(x,y); let d=document.getElementById('d_'+id), l=document.getElementById('l_'+id);
 if(!d){d=document.createElement('div');d.id='d_'+id;d.className='dot '+cls;map.appendChild(d)} else d.className='dot '+cls;
 if(!l){l=document.createElement('div');l.id='l_'+id;l.className='label';map.appendChild(l)}
 d.style.left=p.l+'px'; d.style.top=p.t+'px'; l.style.left=p.l+'px'; l.style.top=p.t+'px'; l.textContent=label;
}
function renderCards(devices){
  cards.innerHTML='';
  devices.forEach(d=>{
    const c=document.createElement('div'); c.className='card';
    let html=`<div class='v'>${d.name}</div><div class='k'>nearest: <span class='v'>${d.nearest_scanner||'-'}</span></div>`;
    Object.entries(d.scanners||{}).forEach(([sid,s])=>{
      html += `<div class='k'>${sid}: RSSI <span class='v'>${s.rssi}</span> | dist ~ <span class='v'>${s.distance}m</span></div>`;
    });
    c.innerHTML=html; cards.appendChild(c);
  });
}
async function tick(){
  const data=await (await fetch('api/state')).json(); layout=data.layout||layout;
  if(!mapSet){map.style.backgroundImage=data.map_available?`url(map.jpg?ts=${data.ts})`:'none'; mapSet=true;}
  Object.entries(layout.scanner_positions||{}).forEach(([id,pos])=>upsert('s_'+id,'scanner',Number(pos.x||0),Number(pos.y||0),`📡 ${id}`));
  (data.fixed_devices||[]).forEach(d=>upsert('f_'+d.device_key,'fixed',Number(d.xy.x||0),Number(d.xy.y||0),`📍 ${d.name}`));
  (data.devices||[]).forEach(d=>{if(d.xy) upsert('m_'+d.device_key,'device',d.xy.x,d.xy.y,`📱 ${d.name}`)});
  renderCards(data.devices||[]);
}
setInterval(tick,1000); tick();
</script></body></html>
