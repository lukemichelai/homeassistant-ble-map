<!doctype html>
<html><head><meta charset="utf-8" /><title>BLE Room Map</title>
<style>
body{font-family:sans-serif;margin:0;display:grid;grid-template-columns:1fr 390px;height:100vh}
#main{display:flex;flex-direction:column;min-width:0}
#top{padding:10px 14px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}
#viewport{position:relative;flex:1;overflow:hidden;background:#f4f4f5;cursor:grab}
#viewport.grabbing{cursor:grabbing}
#layer{position:absolute;left:0;top:0;width:100%;height:100%;transform-origin:0 0}
#mapbg{position:absolute;inset:0;background:center/contain no-repeat}
#overlay{position:absolute;inset:0}
#side{border-left:1px solid #ddd;padding:10px;overflow:auto}
.dot{position:absolute;width:14px;height:14px;border-radius:50%;transform:translate(-50%,-50%);transition:left .35s linear,top .35s linear;cursor:pointer}
.scanner{background:#2563eb}.device{background:#ef4444}.fixed{background:#10b981}.cluster{background:#f59e0b;width:22px;height:22px}
.label{position:absolute;transform:translate(10px,-8px);font-size:12px;background:rgba(0,0,0,.9);color:#fff;padding:2px 6px;border-radius:6px;transition:left .35s linear,top .35s linear;white-space:nowrap;cursor:pointer}
a{text-decoration:none;color:#2563eb;margin-left:10px}.panel{border:1px solid #ddd;border-radius:8px;padding:8px;margin-bottom:10px}
.k{color:#555}.v{font-weight:600}.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.spark{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;margin-top:4px}.bar{height:10px;background:#111}.bar.on{background:#16a34a}
.spark14{display:grid;grid-template-columns:repeat(14,1fr);gap:2px;margin-top:4px}.day{height:12px;background:#111}.day.on{background:#16a34a}
small{color:#666}
</style></head><body>
<div id="main">
  <div id="top">
    <strong>BLE Room Map</strong>
    <div>
      <button id="zoomOut">-</button>
      <button id="zoomIn">+</button>
      <button id="resetView">Reset</button>
      <a href="devices">Devices</a><a href="settings">Settings</a>
    </div>
  </div>
  <div id="viewport">
    <div id="layer">
      <div id="mapbg"></div>
      <div id="overlay"></div>
    </div>
  </div>
</div>
<div id="side">
  <div class="panel">
    <h4 style="margin:4px 0">Selection</h4>
    <div id="selInfo" class="k">Click device label/dot or scanner</div>
    <label>Alias/Name <input id="aliasInput" style="width:100%"></label>
    <div class="row" style="margin-top:8px">
      <button id="saveAliasBtn">Save</button>
      <button id="hideBtn">Hide device</button>
      <button id="unhideBtn">Unhide device</button>
      <button id="fixBtn">Fix at current</button>
      <button id="unfixBtn">Unfix</button>
    </div>
    <small>Drag device/scanner dot to reposition. Release to save.</small>
    <div id="detailBody" style="margin-top:8px;font-size:12px"></div>
  </div>
</div>
<script>
const viewport=document.getElementById('viewport'), layer=document.getElementById('layer'), mapbg=document.getElementById('mapbg'), overlay=document.getElementById('overlay');
const selInfo=document.getElementById('selInfo'), aliasInput=document.getElementById('aliasInput'), detailBody=document.getElementById('detailBody');
const saveAliasBtn=document.getElementById('saveAliasBtn'), hideBtn=document.getElementById('hideBtn'), unhideBtn=document.getElementById('unhideBtn'), fixBtn=document.getElementById('fixBtn'), unfixBtn=document.getElementById('unfixBtn');
const zoomIn=document.getElementById('zoomIn'), zoomOut=document.getElementById('zoomOut'), resetView=document.getElementById('resetView');

let layout={map_width:10,map_height:5,scanner_positions:{},scanner_aliases:{},tracked_devices:{},fixed_devices:{},hidden_devices:[]};
let mapSet=false, expandClusters=false, currentDevices=[], selected={type:null,key:null}, dragging=null;
let scale=1, panX=0, panY=0, panning=false, panStart=null;

function applyView(){ layer.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`; }
zoomIn.onclick=()=>{scale=Math.min(3,scale+0.2);applyView()};
zoomOut.onclick=()=>{scale=Math.max(0.5,scale-0.2);applyView()};
resetView.onclick=()=>{scale=1;panX=0;panY=0;applyView()};
viewport.addEventListener('wheel',e=>{e.preventDefault(); scale=Math.min(3,Math.max(0.5,scale+(e.deltaY<0?0.1:-0.1))); applyView();},{passive:false});
viewport.addEventListener('mousedown',e=>{ if(dragging) return; panning=true; panStart={x:e.clientX-panX,y:e.clientY-panY}; viewport.classList.add('grabbing'); });
window.addEventListener('mousemove',e=>{ if(!panning) return; panX=e.clientX-panStart.x; panY=e.clientY-panStart.y; applyView(); });
window.addEventListener('mouseup',()=>{ panning=false; viewport.classList.remove('grabbing'); });

function px(x,y){const w=overlay.clientWidth,h=overlay.clientHeight;return{l:(x/layout.map_width)*w,t:h-(y/layout.map_height)*h}}
function meters(clientX,clientY){const r=overlay.getBoundingClientRect();const x=((clientX-r.left)/r.width)*layout.map_width;const y=((r.bottom-clientY)/r.height)*layout.map_height;return{x:Number(x.toFixed(2)),y:Number(y.toFixed(2))}}
async function saveLayout(partial){await fetch('api/layout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(partial)})}

function upsert(id,cls,x,y,label,onSelect){
  const p=px(x,y); let d=document.getElementById('d_'+id), l=document.getElementById('l_'+id);
  if(!d){d=document.createElement('div');d.id='d_'+id;overlay.appendChild(d)}
  d.className='dot '+cls; d.style.left=p.l+'px'; d.style.top=p.t+'px';
  d.onmousedown=(ev)=>{ if(cls==='device'||cls==='fixed'||cls==='scanner'){ dragging={id,cls,key:id.replace(/^m_|^f_|^s_/,'' )}; ev.stopPropagation(); onSelect&&onSelect(); } };
  d.onclick=onSelect||null;
  if(!l){l=document.createElement('div');l.id='l_'+id;l.className='label';overlay.appendChild(l)}
  l.style.left=p.l+'px'; l.style.top=p.t+'px'; l.textContent=label; l.onclick=onSelect||null;
}

function cluster(devices){const bs=[],rad=30;devices.forEach(d=>{if(!d.xy)return;const p=px(d.xy.x,d.xy.y);let b=bs.find(b=>Math.hypot(b.p.l-p.l,b.p.t-p.t)<rad);if(!b){b={p,items:[]};bs.push(b)}b.items.push(d)});return bs;}
function fmtTs(ts){if(!ts) return '-'; try{return new Date(ts*1000).toLocaleString()}catch{return '-'}}
function spark24(arr){arr=arr||[]; return `<div class='spark'>${Array.from({length:24}).map((_,i)=>`<div class='bar ${arr[i]?'on':''}'></div>`).join('')}</div>`}
function spark14(arr){arr=arr||[]; return `<div class='spark14'>${arr.map(d=>`<div class='day ${d.present?'on':''}'></div>`).join('')}</div>`}
function renderDetail(d){
  if(!d){detailBody.innerHTML=''; return}
  let html=`<div><span class='k'>First seen:</span> <span class='v'>${fmtTs(d.first_seen)}</span></div>`;
  html += `<div class='k' style='margin-top:6px'>Distance by scanner (RSSI)</div>`;
  Object.entries(d.scanners||{}).forEach(([sid,s])=>{ html+=`<div>• <span class='v'>${sid}</span>: RSSI ${s.rssi}, ~${s.distance}m</div>`; });
  html += `<div class='k' style='margin-top:6px'>Triangulated distance</div>`;
  Object.entries(d.triangulated_distances||{}).forEach(([sid,dist])=>{ html+=`<div>• <span class='v'>${sid}</span>: ~${dist}m</div>`; });
  html += `<div class='k' style='margin-top:8px'>Hourly presence (today)</div>${spark24(d.hourly_presence)}`;
  html += `<div class='k' style='margin-top:8px'>Daily presence (14d)</div>${spark14(d.daily_presence)}`;
  detailBody.innerHTML=html;
}

function selectDevice(d){ selected={type:'device',key:d.device_key}; aliasInput.value=(layout.tracked_devices||{})[d.device_key]||d.name||''; selInfo.textContent=`Device: ${d.name} (${d.device_key})`; renderDetail(d); }
function selectScanner(id){ selected={type:'scanner',key:id}; aliasInput.value=(layout.scanner_aliases||{})[id]||id; selInfo.textContent=`Scanner: ${id}`; detailBody.innerHTML=''; }

window.addEventListener('mousemove', (ev)=>{
  if(!dragging) return;
  const m=meters(ev.clientX,ev.clientY);
  const p=px(m.x,m.y);
  const d=document.getElementById('d_'+dragging.id), l=document.getElementById('l_'+dragging.id);
  if(d){d.style.left=p.l+'px';d.style.top=p.t+'px';}
  if(l){l.style.left=p.l+'px';l.style.top=p.t+'px';}
  if(dragging.cls==='scanner'){
    const sp=layout.scanner_positions||{}; sp[dragging.key]={x:m.x,y:m.y}; layout.scanner_positions=sp;
  } else {
    const fd=layout.fixed_devices||{};
    const name=(layout.tracked_devices||{})[dragging.key] || (currentDevices.find(x=>x.device_key===dragging.key)?.name) || dragging.key;
    fd[dragging.key]={name,x:m.x,y:m.y}; layout.fixed_devices=fd;
  }
});
window.addEventListener('mouseup', async ()=>{
  if(!dragging) return;
  if(dragging.cls==='scanner') await saveLayout({scanner_positions:layout.scanner_positions});
  else await saveLayout({fixed_devices:layout.fixed_devices});
  dragging=null;
  await tick();
});

saveAliasBtn.onclick=async()=>{
  if(!selected.type) return;
  if(selected.type==='device'){
    const t=layout.tracked_devices||{}; t[selected.key]=aliasInput.value.trim(); layout.tracked_devices=t; await saveLayout({tracked_devices:t});
  } else {
    const s=layout.scanner_aliases||{}; s[selected.key]=aliasInput.value.trim(); layout.scanner_aliases=s; await saveLayout({scanner_aliases:s});
  }
  await tick();
};
hideBtn.onclick=async()=>{ if(selected.type!=='device') return; const h=new Set(layout.hidden_devices||[]); h.add(selected.key); layout.hidden_devices=[...h]; await saveLayout({hidden_devices:layout.hidden_devices}); selected={type:null,key:null}; await tick(); };
unhideBtn.onclick=async()=>{ if(selected.type!=='device') return; const h=new Set(layout.hidden_devices||[]); h.delete(selected.key); layout.hidden_devices=[...h]; await saveLayout({hidden_devices:layout.hidden_devices}); await tick(); };
fixBtn.onclick=async()=>{ if(selected.type!=='device') return; const d=currentDevices.find(x=>x.device_key===selected.key); if(!d||!d.xy) return; const fd=layout.fixed_devices||{}; fd[selected.key]={name:(layout.tracked_devices||{})[selected.key]||d.name||selected.key,x:d.xy.x,y:d.xy.y}; layout.fixed_devices=fd; await saveLayout({fixed_devices:fd}); await tick(); };
unfixBtn.onclick=async()=>{ if(selected.type!=='device') return; const fd=layout.fixed_devices||{}; delete fd[selected.key]; layout.fixed_devices=fd; await saveLayout({fixed_devices:fd}); await tick(); };

async function tick(){
  const data=await (await fetch('api/state')).json(); layout=data.layout||layout; currentDevices=data.devices||[];
  if(!mapSet){ mapbg.style.backgroundImage=data.map_available?`url(map.jpg?ts=${data.ts})`:'none'; mapSet=true; }
  [...overlay.querySelectorAll('.dot,.label')].forEach(el=>el.remove());

  Object.entries(layout.scanner_positions||{}).forEach(([id,pos])=>{
    const nm=(layout.scanner_aliases||{})[id]||id;
    upsert('s_'+id,'scanner',Number(pos.x||0),Number(pos.y||0),`📡 ${nm}`,()=>selectScanner(id));
  });

  const fixedKeys=new Set((data.fixed_keys||[]));
  (data.fixed_devices||[]).forEach(d=>upsert('f_'+d.device_key,'fixed',Number(d.xy.x||0),Number(d.xy.y||0),`${d.name}`,()=>selectDevice({device_key:d.device_key,name:d.name,...(currentDevices.find(x=>x.device_key===d.device_key)||{})})));

  const moving=currentDevices.filter(d=>!fixedKeys.has(d.device_key));
  const groups=cluster(moving);
  groups.forEach((g,idx)=>{
    if(g.items.length===1 || expandClusters){
      g.items.forEach(d=>upsert('m_'+d.device_key,'device',d.xy.x,d.xy.y,`${d.name}`,()=>selectDevice(d)));
    } else {
      const mx=(g.items.reduce((a,b)=>a+b.xy.x,0)/g.items.length), my=(g.items.reduce((a,b)=>a+b.xy.y,0)/g.items.length);
      upsert('c_'+idx,'cluster',mx,my,`🧩 ${g.items.length} devices`,()=>{expandClusters=true; tick();});
    }
  });

  if(selected.type==='device'){ renderDetail(currentDevices.find(d=>d.device_key===selected.key)); }
}
setInterval(tick,1000); tick(); applyView();
</script></body></html>
