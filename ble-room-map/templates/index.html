<!doctype html>
<html><head><meta charset="utf-8" /><title>BLE Room Map</title>
<style>
body{font-family:sans-serif;margin:0;display:grid;grid-template-columns:1fr 360px;height:100vh}
#main{display:flex;flex-direction:column;min-width:0}
#top{padding:10px 14px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between}
#map{position:relative;flex:1;background:#f7f7f7 center/contain no-repeat;overflow:hidden}
#side{border-left:1px solid #ddd;padding:10px;overflow:auto}
.dot{position:absolute;width:14px;height:14px;border-radius:50%;transform:translate(-50%,-50%);transition:left .5s linear,top .5s linear;cursor:pointer}
.scanner{background:#2563eb}.device{background:#ef4444}.fixed{background:#10b981}.cluster{background:#f59e0b;width:22px;height:22px}
.label{position:absolute;transform:translate(10px,-8px);font-size:12px;background:rgba(255,255,255,.92);padding:2px 6px;border-radius:6px;transition:left .5s linear,top .5s linear;white-space:nowrap}
a{text-decoration:none;color:#2563eb;margin-left:10px}
.card{border:1px solid #e5e7eb;border-radius:8px;padding:8px;margin-bottom:8px;font-size:12px}
.k{color:#555}.v{font-weight:600}
</style></head><body>
<div id="main">
  <div id="top"><strong>BLE Room Map</strong><div><a href="devices">Devices</a><a href="settings">Settings</a></div></div>
  <div id="map"></div>
</div>
<div id="side">
  <h3 style="margin-top:4px">Live device info</h3>
  <div id="cards"></div>
</div>
<script>
const map=document.getElementById('map'); const cards=document.getElementById('cards');
let layout={map_width:10,map_height:5,scanner_positions:{}}; let mapSet=false; let expandClusters=false;
function px(x,y){const w=map.clientWidth,h=map.clientHeight;return{l:(x/layout.map_width)*w,t:h-(y/layout.map_height)*h}}
function upsert(id,cls,x,y,label,onClick){const p=px(x,y); let d=document.getElementById('d_'+id), l=document.getElementById('l_'+id);
 if(!d){d=document.createElement('div');d.id='d_'+id;map.appendChild(d)}
 d.className='dot '+cls; d.style.left=p.l+'px'; d.style.top=p.t+'px'; d.onclick=onClick||null;
 if(!l){l=document.createElement('div');l.id='l_'+id;l.className='label';map.appendChild(l)}
 l.style.left=p.l+'px'; l.style.top=p.t+'px'; l.textContent=label;
}
function renderCards(devices){
  cards.innerHTML='';
  devices.forEach(d=>{
    const c=document.createElement('div'); c.className='card';
    let html=`<div class='v'>${d.name}</div><div class='k'>nearest: <span class='v'>${d.nearest_scanner||'-'}</span></div>`;
    Object.entries(d.scanners||{}).forEach(([sid,s])=>{
      html += `<div class='k'>${sid}: RSSI <span class='v'>${s.rssi}</span> | dist ~ <span class='v'>${s.distance}m</span></div>`;
    });
    c.innerHTML=html; cards.appendChild(c);
  });
}
function clusterDevices(devices){
  const buckets=[]; const radius=30; // px
  devices.forEach(d=>{
    if(!d.xy) return;
    const p=px(d.xy.x,d.xy.y);
    let b=buckets.find(b=>Math.hypot(b.p.l-p.l,b.p.t-p.t)<radius);
    if(!b){b={p,items:[]}; buckets.push(b)}
    b.items.push(d);
  });
  return buckets;
}
async function tick(){
  const data=await (await fetch('api/state')).json(); layout=data.layout||layout;
  if(!mapSet){map.style.backgroundImage=data.map_available?`url(map.jpg?ts=${data.ts})`:'none'; mapSet=true;}

  // clear only dynamic elements
  [...map.querySelectorAll('.dot,.label')].forEach(el=>el.remove());

  Object.entries(layout.scanner_positions||{}).forEach(([id,pos])=>upsert('s_'+id,'scanner',Number(pos.x||0),Number(pos.y||0),`📡 ${id}`));
  (data.fixed_devices||[]).forEach(d=>upsert('f_'+d.device_key,'fixed',Number(d.xy.x||0),Number(d.xy.y||0),`📍 ${d.name}`));

  const devices=data.devices||[];
  const groups=clusterDevices(devices);
  groups.forEach((g,idx)=>{
    if(g.items.length===1 || expandClusters){
      g.items.forEach(d=>{
        const nearest=d.nearest_scanner; const s=(d.scanners||{})[nearest]||{};
        upsert('m_'+d.device_key,'device',d.xy.x,d.xy.y,`📱 ${d.name} | ${nearest||'-'} RSSI ${s.rssi??'-'} | ~${s.distance??'-'}m`);
      });
    } else {
      const names=g.items.slice(0,4).map(x=>x.name).join(', ')+(g.items.length>4?' ...':'');
      const mx=(g.items.reduce((a,b)=>a+b.xy.x,0)/g.items.length), my=(g.items.reduce((a,b)=>a+b.xy.y,0)/g.items.length);
      upsert('c_'+idx,'cluster',mx,my,`🧩 ${g.items.length} devices (${names})`,()=>{expandClusters=true; tick();});
    }
  });

  renderCards(devices);
}
setInterval(tick,1000); tick();
</script></body></html>
